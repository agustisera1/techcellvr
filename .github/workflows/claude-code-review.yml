name: Claude PR Description

on:
  pull_request:
    types: [opened, reopened]
    branches:
      - main

jobs:
  claude-pr-description:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR title and description
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Analyze the diff of this pull request and update the PR with a clear title and description.

            Rules:
            - Write in Spanish.
            - Title: concise (max 70 chars), imperative mood, no period at the end.
            - Description must use this exact markdown structure:

            ## ¿Qué cambia?
            <1-3 bullet points summarizing the changes>

            ## Motivación
            <One sentence explaining why this change is needed>

            ## Checklist
            - [ ] El código sigue las convenciones del proyecto (CLAUDE.md)
            - [ ] No se introducen secrets ni variables de entorno expuestas
            - [ ] Los componentes UI nuevos usan tokens del design system

            Do not include a code review, suggestions, or comments. Only update the title and body.

